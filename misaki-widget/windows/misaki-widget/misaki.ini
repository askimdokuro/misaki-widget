[Rainmeter]
Update=500
AccurateText=1
DynamicWindowSize=1
FontPath=#@#fonts

[Variables]
@Include=variables.inc

[MeterBackground]
Meter=Image
ImageName=#@#misaki.png
W=#WidgetWidth#
PreserveAspectRatio=1

[MeterDate]
Meter=String
MeasureName=MeasureDate
X=23
Y=80
FontFace=#FontName#
FontSize=#FontSizeDate#
FontColor=#FontColor#
StringAlign=Left
AntiAlias=1

[MeterDay]
Meter=String
MeasureName=MeasureDay
X=28
Y=118
FontFace=#FontName#
FontSize=(#FontSizeDay#)
FontColor=#FontColor#
StringAlign=Left
AntiAlias=1

[MeterTime]
Meter=String
MeasureName=MeasureTime
X=26
Y=155
FontFace=#FontName#
FontSize=(#FontSizeTime#)
FontColor=#FontColor#
StringAlign=Left
AntiAlias=1

[MeasureDate]
Measure=Time
Format=%d %B

[MeasureDay]
Measure=Time
Format=%A

[MeasureTime]
Measure=Time
Format=%H:%M